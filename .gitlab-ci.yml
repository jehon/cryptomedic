stages:
  - build
  - test
  - validate
  - deploy

default:
  timeout: 10m

.docker:
  image: ubuntu:latest
  variables:
    NO_CLEAR: "yes"
    DOCKER_HOST: "tcp://docker"
  services:
    - name: docker:dind
      alias: docker
  before_script:
    - apt-get update
    - apt-get install -y curl
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash
    - apt-get install -y docker.io nodejs
    - ./setup.sh

build:
  stage: build
  extends: .docker
  script:
    - make dump
    - make build
  artifacts:
    paths:
      - .ovhconfig
      - www

tests-unit:
  stage: test
  image: docker:dind
  parallel:
    matrix:
      - target:
        - dump
        - lint
        - frontend-test
  script:
    - make github
    - make $target

tests-unit-with-backend:
  stage: test
  image: docker:dind
  parallel:
    matrix:
      - target:
        - backend-test
  script:
    - make github
    - make dependencies
    - make start
    - make $target

tests-e2e:
  stage: test
  image: docker:dind
  parallel:
    matrix:
      - flavor:
        - desktop
        - playwright
  script:
    - ./setup.sh
    - make github
    - make dc-build
    - make start
    - make dependencies
    - make integration-test-${flavor}-run
    - make integration-test-${flavor}-styles
  artifacts:
    when: always
    paths:
      - tmp/integration/$flavor

update-e2e:
  stage: test
  image: ubuntu:latest
  script:
    - ./setup.sh
    - make github
    - make dc-build
    - make start
    - make dependencies
    - UPDATE=1 make integration-update-playwright
    - git status
  artifacts:
    when: always
    paths:
      - tests/e2e/**/*.png

valid:
  stage: validate
  image: ubuntu:latest
  needs:
    - tests-unit
    - tests-e2e
    - tests-unit-with-backend
  script:
    - echo "ok"

